name: Build and release extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Prepare release metadata
        id: release
        run: node scripts/prepare-release.mjs

      - name: Package extension
        run: |
          mkdir -p release
          cd dist
          zip -r "../release/${{ steps.release.outputs.asset_name }}" .

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
          NOTES_PATH: ${{ steps.release.outputs.notes_path }}
          ASSET_PATH: release/${{ steps.release.outputs.asset_name }}
        run: |
          gh release create "$TAG_NAME" "$ASSET_PATH" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes-file "$NOTES_PATH"
